<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Inspirelabs share card">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0E0F0A" stroke-width="0.5" stroke-opacity="0.06"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#FFFFFF"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Inspirelabs wordmark + mark, centered above middle -->
  <g transform="translate(225 220)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="800" letter-spacing="-3" fill="#0E0F0A">Inspirelabs</text>
    <!-- Orange dot above the lowercase i in 'spire' -->
    <circle cx="297" cy="-78" r="13" fill="#FF7A45"/>
    <!-- 4-square mark to the right of the wordmark -->
    <g transform="translate(770 -68)">
      <rect x="0" y="0" width="36" height="36" rx="6" fill="#FF7A45"/>
      <rect x="44" y="0" width="36" height="36" rx="6" fill="#0E0F0A"/>
      <rect x="0" y="44" width="36" height="36" rx="6" fill="#6F7583"/>
      <rect x="45" y="45" width="34" height="34" rx="5" fill="none" stroke="#8C92A0" stroke-width="2" stroke-dasharray="4 3"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="-0.5" fill="#3F4756">Growth infrastructure powering 4,500+ brands</text>
  <text x="600" y="424" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="500" letter-spacing="-0.5" fill="#3F4756">and 200 million users.</text>

  <!-- Bottom: orange accent + url + tag -->
  <line x1="540" y1="510" x2="660" y2="510" stroke="#FF7A45" stroke-width="3"/>
  <text x="600" y="560" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="600" letter-spacing="3" fill="#0E0F0A">INSPIRELABS.COM</text>
  <text x="600" y="585" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="500" letter-spacing="2" fill="#8C92A0">HYDERABAD &middot; SINCE 2013 &middot; BOOTSTRAPPED</text>
</svg>
