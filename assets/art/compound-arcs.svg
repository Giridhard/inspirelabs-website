<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Compounding concentric arcs">
  <title>Compounding concentric arcs</title>
  <defs>
    <linearGradient id="ca-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#4040DD" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4040DD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ca-g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#7940C9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7940C9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ca-g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4040DD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4040DD" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ca-core" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5B5CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="ca-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <g filter="url(#ca-blur)">
    <circle cx="300" cy="300" r="280" fill="url(#ca-core)"/>
  </g>
  <g fill="none" transform="translate(300 300)">
    <circle r="120" stroke="url(#ca-g1)" stroke-width="2"/>
    <circle r="220" stroke="url(#ca-g2)" stroke-width="1.6"/>
    <circle r="340" stroke="url(#ca-g1)" stroke-width="1.3" stroke-dasharray="3 5"/>
    <circle r="470" stroke="url(#ca-g3)" stroke-width="1.1"/>
    <circle r="600" stroke="url(#ca-g2)" stroke-width="0.95"/>
    <circle r="730" stroke="url(#ca-g1)" stroke-width="0.85" stroke-dasharray="2 6"/>
    <circle r="860" stroke="url(#ca-g3)" stroke-width="0.75"/>
    <circle r="990" stroke="url(#ca-g2)" stroke-width="0.65"/>
    <circle r="1120" stroke="url(#ca-g3)" stroke-width="0.6" stroke-dasharray="1 7"/>
  </g>
  <g>
    <circle cx="300" cy="180" r="3" fill="#5B5CFF"/>
    <circle cx="500" cy="180" r="2.5" fill="#5B5CFF" opacity="0.8"/>
    <circle cx="640" cy="280" r="3" fill="#7940C9"/>
    <circle cx="300" cy="80" r="2.5" fill="#5B5CFF" opacity="0.7"/>
    <circle cx="760" cy="380" r="2" fill="#4040DD" opacity="0.6"/>
  </g>
</svg>
