<svg viewBox="0 0 320 68" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inspirelabs">
  <!-- Wordmark using dotless ı (U+0131) so we can draw the orange dot ourselves -->
  <text x="0" y="54" font-family="Hanken Grotesk, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="56" letter-spacing="-0.035em" fill="#0E0F0A">Inspırelabs</text>
  <!-- Orange Active dot replacing the dot on the second 'i' (the ı in Inspırelabs) -->
  <circle cx="92" cy="10" r="6" fill="#FF7A45"/>
  <!-- Grid mark: 2x2 cells, 14px each with 4px gap -->
  <g transform="translate(254 12)">
    <rect x="0"  y="0"  width="14" height="14" fill="#FF7A45"/>
    <rect x="18" y="0"  width="14" height="14" fill="#0E0F0A"/>
    <rect x="0"  y="18" width="14" height="14" fill="#6F7583"/>
    <rect x="18.75" y="18.75" width="12.5" height="12.5" fill="none" stroke="#0E0F0A" stroke-width="1.4" stroke-dasharray="2 1.8"/>
  </g>
</svg>
