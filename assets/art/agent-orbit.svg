<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-label="Agent orbit constellation">
  <title>Agent orbit constellation</title>
  <defs>
    <radialGradient id="ao-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#4040DD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4040DD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ao-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5B5CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ao-ring1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#5B5CFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5B5CFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ao-ring2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7940C9" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#7940C9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7940C9" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ao-ring3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008EE6" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#008EE6" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#008EE6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="ao-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="ao-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <g filter="url(#ao-blur)">
    <circle cx="450" cy="450" r="220" fill="url(#ao-halo)"/>
  </g>
  <g fill="none" transform="translate(450 450)">
    <g transform="rotate(-30)">
      <ellipse rx="140" ry="60" stroke="url(#ao-ring1)" stroke-width="1"/>
    </g>
    <g transform="rotate(20)">
      <ellipse rx="200" ry="85" stroke="url(#ao-ring2)" stroke-width="0.9" stroke-dasharray="4 5"/>
    </g>
    <g transform="rotate(-15)">
      <ellipse rx="260" ry="115" stroke="url(#ao-ring3)" stroke-width="0.85"/>
    </g>
    <g transform="rotate(30)">
      <ellipse rx="320" ry="150" stroke="url(#ao-ring1)" stroke-width="0.75" stroke-dasharray="2 6"/>
    </g>
    <g transform="rotate(-22)">
      <ellipse rx="380" ry="180" stroke="url(#ao-ring2)" stroke-width="0.7"/>
    </g>
    <g transform="rotate(10)">
      <ellipse rx="430" ry="210" stroke="url(#ao-ring3)" stroke-width="0.65" stroke-dasharray="1 7"/>
    </g>
  </g>
  <g filter="url(#ao-soft)" opacity="0.85">
    <circle cx="450" cy="450" r="46" fill="url(#ao-core)"/>
  </g>
  <circle cx="450" cy="450" r="14" fill="#5B5CFF"/>
  <circle cx="450" cy="450" r="6" fill="#fff" opacity="0.9"/>
  <g transform="translate(450 450)">
    <g transform="rotate(-30)">
      <circle cx="140" cy="0" r="5" fill="#5B5CFF"/>
      <circle cx="-140" cy="0" r="5" fill="#5B5CFF"/>
    </g>
    <g transform="rotate(20)">
      <circle cx="188" cy="-30" r="5" fill="#7940C9"/>
      <circle cx="-188" cy="30" r="5" fill="#7940C9"/>
    </g>
    <g transform="rotate(-15)">
      <circle cx="240" cy="50" r="5" fill="#008EE6"/>
      <circle cx="-240" cy="-50" r="5" fill="#008EE6"/>
    </g>
    <g transform="rotate(30)">
      <circle cx="300" cy="-60" r="4.5" fill="#5B5CFF"/>
      <circle cx="-300" cy="60" r="4.5" fill="#5B5CFF"/>
    </g>
    <g transform="rotate(-22)">
      <circle cx="360" cy="80" r="4" fill="#7940C9"/>
      <circle cx="-360" cy="-80" r="4" fill="#7940C9"/>
    </g>
    <g transform="rotate(10)">
      <circle cx="410" cy="-95" r="4" fill="#008EE6"/>
      <circle cx="-410" cy="95" r="4" fill="#008EE6"/>
    </g>
  </g>
  <g opacity="0.55">
    <circle cx="120" cy="180" r="2" fill="#5B5CFF"/>
    <circle cx="820" cy="220" r="1.8" fill="#7940C9"/>
    <circle cx="780" cy="760" r="2" fill="#008EE6"/>
    <circle cx="80" cy="700" r="1.6" fill="#5B5CFF"/>
    <circle cx="500" cy="60" r="1.8" fill="#7940C9"/>
    <circle cx="420" cy="860" r="2" fill="#008EE6"/>
  </g>
</svg>
