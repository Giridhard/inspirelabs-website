<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a2e"/>
      <stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="100" height="100" rx="22" fill="white" opacity="0.04"/>

  <!-- W letterform — bold, clean strokes -->
  <polyline
    points="13,24 27,70 50,36 73,70 87,24"
    fill="none"
    stroke="white"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Green accent underline — pen stroke effect -->
  <line x1="30" y1="82" x2="70" y2="82" stroke="url(#accent)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Pen nib dot -->
  <circle cx="70" cy="82" r="3" fill="#86efac"/>
</svg>
