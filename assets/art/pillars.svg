<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Architectural gradient pillars">
  <title>Architectural gradient pillars</title>
  <defs>
    <linearGradient id="pl-violet" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#5B5CFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5B5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pl-sky" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#008EE6" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#008EE6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#008EE6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pl-purple" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7940C9" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#7940C9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7940C9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pl-coral" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF7058" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FF7058" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF7058" stop-opacity="0"/>
    </linearGradient>
    <filter id="pl-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <line x1="80" y1="620" x2="1120" y2="620" stroke="#28538F" stroke-width="0.8" stroke-opacity="0.5"/>
  <g>
    <rect x="200" y="248" width="90" height="372" rx="4" fill="url(#pl-violet)"/>
    <rect x="420" y="124" width="90" height="496" rx="4" fill="url(#pl-sky)"/>
    <rect x="640" y="20" width="90" height="600" rx="4" fill="url(#pl-purple)"/>
    <rect x="860" y="155" width="90" height="465" rx="4" fill="url(#pl-coral)"/>
  </g>
  <g filter="url(#pl-glow)" opacity="0.85">
    <circle cx="245" cy="200" r="9" fill="#5B5CFF"/>
    <circle cx="465" cy="80" r="9" fill="#008EE6"/>
    <circle cx="685" cy="-30" r="9" fill="#7940C9"/>
    <circle cx="905" cy="110" r="9" fill="#FF7058"/>
  </g>
  <g>
    <circle cx="245" cy="200" r="5" fill="#5B5CFF"/>
    <circle cx="465" cy="80" r="5" fill="#008EE6"/>
    <circle cx="685" cy="40" r="5" fill="#7940C9"/>
    <circle cx="905" cy="110" r="5" fill="#FF7058"/>
  </g>
</svg>
