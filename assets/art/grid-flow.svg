<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Flowing curves over dot grid">
  <title>Flowing curves over dot grid</title>
  <defs>
    <linearGradient id="gf-flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B5CFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5B5CFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7940C9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gf-flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#008EE6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#008EE6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4040DD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gf-flow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7940C9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7940C9" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#5B5CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gf-mask-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="10%" stop-color="#fff"/>
      <stop offset="90%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <mask id="gf-edge-mask">
      <rect width="1600" height="600" fill="url(#gf-mask-grad)"/>
    </mask>
    <filter id="gf-blur" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <pattern id="gf-dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#28538F" fill-opacity="0.35"/>
    </pattern>
  </defs>
  <g mask="url(#gf-edge-mask)">
    <rect width="1600" height="600" fill="url(#gf-dots)"/>
    <g fill="none" stroke-linecap="round">
      <path d="M -50,260 C 300,140 600,420 900,250 C 1150,110 1400,340 1650,220" stroke="url(#gf-flow1)" stroke-width="2.6" filter="url(#gf-blur)" opacity="0.6"/>
      <path d="M -50,260 C 300,140 600,420 900,250 C 1150,110 1400,340 1650,220" stroke="url(#gf-flow1)" stroke-width="2.2"/>
      <path d="M -50,360 C 280,500 580,200 900,360 C 1180,500 1400,260 1650,380" stroke="url(#gf-flow2)" stroke-width="2.4" filter="url(#gf-blur)" opacity="0.55"/>
      <path d="M -50,360 C 280,500 580,200 900,360 C 1180,500 1400,260 1650,380" stroke="url(#gf-flow2)" stroke-width="2"/>
      <path d="M -50,470 C 320,380 620,540 920,440 C 1200,360 1400,500 1650,440" stroke="url(#gf-flow3)" stroke-width="2.2" filter="url(#gf-blur)" opacity="0.5"/>
      <path d="M -50,470 C 320,380 620,540 920,440 C 1200,360 1400,500 1650,440" stroke="url(#gf-flow3)" stroke-width="1.8"/>
    </g>
    <g>
      <circle cx="320" cy="220" r="3" fill="#5B5CFF"/>
      <circle cx="608" cy="304" r="3" fill="#5B5CFF"/>
      <circle cx="896" cy="256" r="3.5" fill="#7940C9"/>
      <circle cx="1184" cy="208" r="3" fill="#5B5CFF"/>
      <circle cx="416" cy="464" r="3" fill="#008EE6"/>
      <circle cx="704" cy="320" r="3" fill="#008EE6"/>
      <circle cx="1024" cy="416" r="3.5" fill="#008EE6"/>
      <circle cx="1312" cy="304" r="3" fill="#4040DD"/>
      <circle cx="512" cy="416" r="3" fill="#7940C9"/>
      <circle cx="832" cy="480" r="3.5" fill="#7940C9"/>
      <circle cx="1120" cy="400" r="3" fill="#7940C9"/>
      <circle cx="1440" cy="448" r="3" fill="#5B5CFF"/>
    </g>
  </g>
</svg>
