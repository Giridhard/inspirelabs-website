<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stylized illustration of an operator running multiple platforms">
  <defs>
    <linearGradient id="rp-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECECFF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="500" width="600" height="100" fill="url(#rp-glow)"/>
  <line x1="0" y1="500" x2="600" y2="500" stroke="#0A0A0A" stroke-width="2.4"/>
  <!-- desk -->
  <rect x="120" y="420" width="360" height="16" rx="4" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <line x1="160" y1="436" x2="160" y2="500" stroke="#0A0A0A" stroke-width="2.4"/>
  <line x1="440" y1="436" x2="440" y2="500" stroke="#0A0A0A" stroke-width="2.4"/>
  <!-- monitor (centre) -->
  <rect x="220" y="240" width="160" height="120" rx="6" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <line x1="300" y1="360" x2="300" y2="408" stroke="#0A0A0A" stroke-width="2.4"/>
  <rect x="276" y="408" width="48" height="12" rx="2" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <!-- screen content: 5 platform stripes -->
  <rect x="234" y="258" width="132" height="14" rx="2" fill="#28538F"/>
  <rect x="234" y="278" width="132" height="14" rx="2" fill="#008EE6"/>
  <rect x="234" y="298" width="132" height="14" rx="2" fill="#7940C9"/>
  <rect x="234" y="318" width="132" height="14" rx="2" fill="#FF7058"/>
  <rect x="234" y="338" width="132" height="14" rx="2" fill="#008CE2"/>
  <!-- person on the left, gesturing toward screen -->
  <circle cx="120" cy="320" r="26" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <path d="M 86 408 C 86 376, 154 376, 154 408" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <line x1="94" y1="408" x2="94" y2="500" stroke="#0A0A0A" stroke-width="2.4"/>
  <line x1="146" y1="408" x2="146" y2="500" stroke="#0A0A0A" stroke-width="2.4"/>
  <!-- pointing arm -->
  <line x1="146" y1="380" x2="220" y2="320" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- floating signals -->
  <circle cx="430" cy="180" r="8" fill="#5B5CFF"/>
  <circle cx="478" cy="220" r="5" fill="#FF7058"/>
  <circle cx="500" cy="280" r="6" fill="#7940C9"/>
  <circle cx="100" cy="140" r="5" fill="#008EE6"/>
  <circle cx="148" cy="180" r="4" fill="#28538F"/>
  <!-- two arrow connectors from screen out -->
  <path d="M 380 270 Q 420 220, 478 220" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
  <path d="M 380 330 Q 420 290, 500 280" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round"/>
  <!-- title chip top-left -->
  <rect x="40" y="80" width="116" height="32" rx="16" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="2.4"/>
  <text x="98" y="101" text-anchor="middle" font-family="Figtree, sans-serif" font-weight="700" font-size="13" letter-spacing="0.04em" fill="#0A0A0A">LIVE OPS</text>
</svg>
